<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dispatch Board">
<meta name="theme-color" content="#0B2545">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-180.png">
<link rel="icon" type="image/png" sizes="32x32" href="./icons/favicon-32.png">
<link rel="icon" type="image/png" sizes="192x192" href="./icons/icon-192.png">
<title>Dispatch Board — Umar Hashmi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0B2545; --panel:#13315C; --line:#2C4C7C; --paper:#E8EEF5;
    --muted:#8FA6C6; --amber:#FFB627; --green:#4FB286; --red:#E0654B;
    --hi:#E0654B; --med:#FFB627; --lo:#6FA8DC;
    --cat-cornell:#E0654B; --cat-cert:#FFB627; --cat-cad:#6FA8DC;
    --cat-github:#B18CF5; --cat-book:#4FB286; --cat-other:#8FA6C6;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--ink);
    background-image: linear-gradient(var(--line) 1px, transparent 1px), linear-gradient(90deg, var(--line) 1px, transparent 1px);
    background-size:28px 28px; background-attachment:fixed;
    color:var(--paper); font-family:'Inter',sans-serif; min-height:100vh; padding:16px 12px 50px;
  }
  .board{ max-width:760px; margin:0 auto; border:1.5px solid var(--line); background:rgba(11,37,69,0.62); box-shadow:0 20px 60px rgba(0,0,0,0.35); }

  .head{ padding:18px 20px; border-bottom:1.5px solid var(--line); display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:12px;}
  .head-left{ display:flex; align-items:center; gap:12px; }
  .logo{ width:38px; height:38px; flex-shrink:0; }
  .head h1{ font-family:'Oswald',sans-serif; font-size:21px; text-transform:uppercase; margin:0 0 2px; letter-spacing:0.5px;}
  .head .sub{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); letter-spacing:0.5px;}
  .hours-box{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--muted); text-align:right;}
  .hours-box input{ background:var(--panel); border:1px solid var(--line); color:var(--paper); font-family:'JetBrains Mono',monospace; font-size:13px; width:54px; padding:5px 6px; border-radius:4px; margin-left:6px;}
  .hours-box button{ margin-left:6px; background:var(--amber); border:none; color:#1a1400; font-weight:700; font-size:10px; padding:6px 9px; border-radius:4px; cursor:pointer; font-family:'JetBrains Mono',monospace; transition:transform .12s;}
  .hours-box button:active{ transform:scale(0.94); }

  .checkin-banner{ background:rgba(255,182,39,0.12); border-bottom:1.5px solid var(--amber); padding:10px 20px; font-size:12.5px; display:flex; justify-content:space-between; align-items:center; gap:10px;}
  .checkin-banner button{ background:transparent; border:1px solid var(--amber); color:var(--amber); font-size:10px; padding:5px 9px; border-radius:4px; cursor:pointer; font-family:'JetBrains Mono',monospace; white-space:nowrap;}

  /* PROGRESS RING + STATS */
  .stats-panel{ padding:16px 20px; border-bottom:1.5px solid var(--line); display:grid; grid-template-columns: auto 1fr; gap:20px; align-items:center;}
  .ring-wrap{ position:relative; width:74px; height:74px; flex-shrink:0;}
  .ring-wrap svg{ transform:rotate(-90deg);}
  .ring-label{ position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; font-family:'JetBrains Mono',monospace;}
  .ring-label .pct{ font-size:15px; font-weight:700;}
  .ring-label .txt{ font-size:7px; color:var(--muted); letter-spacing:0.5px;}
  .stat-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:10px;}
  .stat-cell .num{ font-family:'JetBrains Mono',monospace; font-size:17px; font-weight:700; color:var(--paper);}
  .stat-cell .lbl{ font-family:'JetBrains Mono',monospace; font-size:8.5px; color:var(--muted); text-transform:uppercase; letter-spacing:0.8px; margin-top:2px;}
  .chart-row{ display:flex; align-items:flex-end; gap:5px; height:34px; margin-top:12px;}
  .chart-bar{ flex:1; background:var(--panel); border:1px solid var(--line); border-radius:2px 2px 0 0; position:relative; min-height:3px; transition:height .3s;}
  .chart-bar.today{ background:var(--amber); border-color:var(--amber);}
  .chart-labels{ display:flex; gap:5px; margin-top:3px;}
  .chart-labels span{ flex:1; text-align:center; font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted);}

  .analytics-section{ padding:16px 20px; border-bottom:1.5px solid var(--line);}
  .analytics-tabs{ display:flex; gap:6px; margin-bottom:14px; flex-wrap:wrap;}
  .analytics-tab{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:6px 11px; border-radius:4px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; text-transform:uppercase; letter-spacing:0.5px;}
  .analytics-tab.active{ border-color:var(--amber); color:var(--amber);}

  .compare-row{ display:flex; align-items:flex-end; gap:8px; height:80px; margin:10px 0 4px;}
  .compare-col{ flex:1; display:flex; flex-direction:column; align-items:center; gap:2px;}
  .compare-bars{ display:flex; gap:2px; align-items:flex-end; height:70px; width:100%; justify-content:center;}
  .compare-bar{ width:9px; border-radius:2px 2px 0 0; min-height:2px; transition:height .3s;}
  .compare-bar.this{ background:var(--amber);}
  .compare-bar.last{ background:var(--muted); opacity:0.55;}
  .compare-day-label{ font-family:'JetBrains Mono',monospace; font-size:8px; color:var(--muted);}
  .legend-row{ display:flex; gap:16px; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted);}
  .legend-dot{ display:inline-block; width:8px; height:8px; border-radius:2px; margin-right:5px;}

  .heatmap-wrap{ overflow-x:auto; padding-bottom:4px;}
  .heatmap-grid{ display:grid; grid-auto-flow:column; grid-template-rows:repeat(7,1fr); gap:3px; width:max-content;}
  .heat-cell{ width:11px; height:11px; border-radius:2px; background:var(--panel); border:1px solid var(--line);}
  .heat-cell.l1{ background:#1F5A45; border-color:#1F5A45;}
  .heat-cell.l2{ background:#2E7D5B; border-color:#2E7D5B;}
  .heat-cell.l3{ background:#4FB286; border-color:#4FB286;}
  .heat-cell.l4{ background:#7EE6BB; border-color:#7EE6BB;}
  .heat-cell.today-cell{ outline:1.5px solid var(--amber); outline-offset:1px;}
  .heatmap-legend{ display:flex; align-items:center; gap:4px; margin-top:8px; font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--muted);}

  .catbar-row{ display:flex; align-items:center; gap:10px; margin-bottom:9px;}
  .catbar-label{ width:64px; flex-shrink:0; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); text-transform:uppercase;}
  .catbar-track{ flex:1; height:10px; background:var(--panel); border-radius:5px; overflow:hidden;}
  .catbar-fill{ height:100%; border-radius:5px; transition:width .3s;}
  .catbar-val{ width:44px; text-align:right; font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--paper); flex-shrink:0;}

  body.light{
    --ink:#EEF2F8; --panel:#FFFFFF; --line:#C7D4E6; --paper:#16283F; --muted:#5C7091;
  }
  body.light .board{ background:rgba(255,255,255,0.82); box-shadow:0 20px 50px rgba(20,40,70,0.12);}
  body.light .stampbtn, body.light .icon-btn{ color:var(--muted);}

  .theme-toggle{ width:34px; height:34px; border-radius:50%; border:1px solid var(--line); background:transparent; color:var(--paper); cursor:pointer; font-size:15px; display:flex; align-items:center; justify-content:center;}

  .quote-banner{ padding:10px 20px; border-bottom:1.5px solid var(--line); display:flex; justify-content:space-between; align-items:center; gap:10px; background:rgba(255,182,39,0.04);}
  .quote-text{ font-family:'Oswald',sans-serif; font-size:12.5px; font-style:italic; color:var(--paper); letter-spacing:0.2px;}
  .quote-shuffle{ font-family:'JetBrains Mono',monospace; font-size:9px; padding:5px 8px; border-radius:4px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; white-space:nowrap; flex-shrink:0;}

  .vitals-section{ padding:16px 20px; border-bottom:1.5px solid var(--line);}
  .vitals-grid{ display:grid; grid-template-columns:1fr 1fr; gap:14px;}
  @media (max-width:520px){ .vitals-grid{ grid-template-columns:1fr; } }
  .vital-card{ border:1px solid var(--line); border-radius:6px; padding:12px;}
  .vital-title{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1.2px; color:var(--muted); text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:5px;}
  .vital-inputs{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:8px;}
  .vital-inputs input, .vital-inputs select{ background:var(--ink); border:1px solid var(--line); color:var(--paper); padding:7px 8px; border-radius:4px; font-size:12px; font-family:'JetBrains Mono',monospace; flex:1 1 70px; min-width:0;}
  .vital-inputs button{ background:var(--amber); border:none; color:#1a1400; font-weight:700; padding:7px 12px; border-radius:4px; cursor:pointer; font-family:'Oswald',sans-serif; font-size:11px; text-transform:uppercase; flex-shrink:0;}
  .vital-readout{ font-family:'JetBrains Mono',monospace; font-size:13px; color:var(--paper); font-weight:700;}
  .vital-sub{ font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--muted); margin-top:2px;}
  .mini-trend{ display:flex; align-items:flex-end; gap:2px; height:26px; margin-top:8px;}
  .mini-bar{ flex:1; background:var(--amber); opacity:0.75; border-radius:1px 1px 0 0; min-height:2px;}
  .run-log-item{ font-family:'JetBrains Mono',monospace; font-size:10px; color:var(--muted); padding:3px 0; border-top:1px dashed var(--line); margin-top:6px;}

  .share-btn-row{ padding:14px 20px; border-bottom:1.5px solid var(--line);}
  .share-btn{ width:100%; background:transparent; border:2px solid var(--green); color:var(--green); font-family:'Oswald',sans-serif; font-weight:700; text-transform:uppercase; letter-spacing:0.5px; padding:11px; border-radius:5px; cursor:pointer; font-size:13px;}

  .break-row{ padding:12px 20px; border-bottom:1.5px solid var(--line); display:flex; align-items:center; justify-content:space-between; gap:10px; flex-wrap:wrap;}
  .break-row .status{ font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted);}
  .break-row .status.active{ color:var(--amber);}
  .breakbtn{ font-family:'Oswald',sans-serif; font-weight:600; font-size:12px; letter-spacing:0.5px; text-transform:uppercase; padding:8px 14px; border-radius:4px; border:2px solid var(--amber); background:transparent; color:var(--amber); cursor:pointer; transition:transform .12s;}
  .breakbtn:active{ transform:scale(0.96);}
  .breakbtn.active{ background:var(--amber); color:#1a1400;}

  .add-section{ padding:16px 20px; border-bottom:1.5px solid var(--line);}
  .add-section .label{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; margin-bottom:8px;}
  .add-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .add-row input[type=text]{ flex:1 1 160px; background:var(--panel); border:1px solid var(--line); color:var(--paper); padding:9px 10px; border-radius:4px; font-size:13px; font-family:'Inter',sans-serif;}
  .add-row select, .add-row input[type=number]{ background:var(--panel); border:1px solid var(--line); color:var(--paper); padding:9px 8px; border-radius:4px; font-size:12px; font-family:'JetBrains Mono',monospace; width:82px;}
  .add-row label.chk{ display:flex; align-items:center; gap:5px; font-size:11px; color:var(--muted); font-family:'JetBrains Mono',monospace;}
  .add-row button{ background:var(--green); border:none; color:#052617; font-weight:700; padding:9px 16px; border-radius:4px; cursor:pointer; font-family:'Oswald',sans-serif; letter-spacing:0.5px; text-transform:uppercase; font-size:12px; transition:transform .12s;}
  .add-row button:active{ transform:scale(0.96);}

  .filter-row{ display:flex; gap:6px; flex-wrap:wrap; padding:12px 20px 0; }
  .filter-pill{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:5px 10px; border-radius:12px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; transition:all .15s;}
  .filter-pill.active{ border-color:currentColor;}

  .section-title{ font-family:'JetBrains Mono',monospace; font-size:9px; letter-spacing:1.5px; color:var(--muted); text-transform:uppercase; padding:14px 20px 6px;}

  .task-row{ display:flex; align-items:center; gap:10px; padding:11px 20px; border-bottom:1px solid var(--line); transition:background .2s;}
  .task-row.done{ background:rgba(79,178,134,0.06);}
  .prio-tag{ width:7px; align-self:stretch; border-radius:2px; flex-shrink:0;}
  .prio-tag.high{ background:var(--hi);} .prio-tag.medium{ background:var(--med);} .prio-tag.low{ background:var(--lo);}
  .task-main{ flex:1; min-width:0;}
  .task-name-row{ display:flex; align-items:center; gap:6px; flex-wrap:wrap;}
  .task-name{ font-family:'Oswald',sans-serif; font-size:14px; text-transform:uppercase; letter-spacing:0.3px;}
  .cat-tag{ font-family:'JetBrains Mono',monospace; font-size:8.5px; padding:2px 6px; border-radius:8px; text-transform:uppercase; letter-spacing:0.5px; color:#0B2545; font-weight:700;}
  .streak-badge{ font-size:11px; }
  .task-meta{ font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); margin-top:3px;}
  .task-time{ font-family:'JetBrains Mono',monospace; font-size:11px; color:var(--paper); text-align:right; white-space:nowrap;}
  .task-actions{ display:flex; gap:5px; flex-shrink:0;}
  .icon-btn{ width:28px; height:28px; border-radius:4px; border:1px solid var(--line); background:transparent; color:var(--muted); cursor:pointer; font-size:12px; display:flex; align-items:center; justify-content:center; transition:all .12s;}
  .icon-btn:hover{ border-color:var(--paper); color:var(--paper);}
  .donebtn{ width:34px; height:34px; border-radius:4px; border:2px solid var(--muted); background:transparent; color:var(--muted); cursor:pointer; font-size:14px; flex-shrink:0; transition:transform .15s;}
  .donebtn.checked{ background:var(--green); border-color:var(--green); color:#052617;}
  .donebtn.bump{ animation:bump .3s ease; }
  @keyframes bump{ 0%{transform:scale(1);} 40%{transform:scale(1.25);} 100%{transform:scale(1);} }

  .edit-row{ padding:10px 20px; border-bottom:1px solid var(--line); background:rgba(255,182,39,0.05);}
  .edit-row .erow{ display:flex; gap:6px; flex-wrap:wrap; margin-bottom:6px;}
  .edit-row input[type=text]{ flex:1 1 140px; background:var(--panel); border:1px solid var(--line); color:var(--paper); padding:7px 9px; border-radius:4px; font-size:12.5px;}
  .edit-row select, .edit-row input[type=number]{ background:var(--panel); border:1px solid var(--line); color:var(--paper); padding:7px 7px; border-radius:4px; font-size:11.5px; width:76px; font-family:'JetBrains Mono',monospace;}
  .edit-row .ebtns button{ font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:6px 10px; border-radius:4px; cursor:pointer; border:1px solid var(--line); background:transparent; color:var(--paper); margin-right:6px;}
  .edit-row .ebtns button.save{ border-color:var(--green); color:var(--green);}

  .decision-card{ margin:10px 20px; padding:10px 12px; border:1.5px dashed var(--amber); border-radius:4px; background:rgba(255,182,39,0.06);}
  .decision-card .dtitle{ font-family:'Oswald',sans-serif; font-size:13px; text-transform:uppercase; margin-bottom:4px;}
  .decision-card .dtext{ font-size:11.5px; color:var(--muted); margin-bottom:8px;}
  .decision-card .dbtns{ display:flex; gap:8px;}
  .decision-card button{ font-family:'JetBrains Mono',monospace; font-size:10.5px; padding:6px 10px; border-radius:4px; cursor:pointer; border:1px solid var(--amber); background:transparent; color:var(--amber);}

  .pool-row{ display:flex; justify-content:space-between; align-items:center; padding:8px 20px; border-bottom:1px solid var(--line); font-size:12px; color:var(--muted);}
  .pool-row button{ font-family:'JetBrains Mono',monospace; font-size:10px; padding:5px 8px; border-radius:4px; border:1px solid var(--muted); background:transparent; color:var(--muted); cursor:pointer;}

  .empty{ padding:16px 20px; color:var(--muted); font-size:12px; font-style:italic;}
  .footer-note{ padding:14px 20px 18px; font-size:11px; color:var(--muted); line-height:1.5; border-top:1.5px solid var(--line); margin-top:6px;}
</style>
</head>
<body>
<div class="board" id="board">Loading dispatch board…</div>

<script>
const PRIO_WEIGHT = { high:3, medium:2, low:1 };
const PRIO_LABEL = { high:'High', medium:'Medium', low:'Low' };
const CATEGORIES = ['Course','Skill','Portfolio','Projects','Book','Other'];
const CAT_COLOR = { Course:'var(--cat-cornell)', Skill:'var(--cat-cert)', Portfolio:'var(--cat-cad)', Projects:'var(--cat-github)', Book:'var(--cat-book)', Other:'var(--cat-other)' };

let STATE = { tasks: [], days: {}, lastCheckin: null };
let activeFilter = 'all';
let editingId = null;
const todayKey = () => new Date().toISOString().slice(0,10);
function dateKey(offset){ const d=new Date(); d.setDate(d.getDate()-offset); return d.toISOString().slice(0,10); }
function fmtTime(d){ return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit'}); }
function minsToLabel(m){ if(m<60) return m+'m'; const h=Math.floor(m/60), r=m%60; return r? h+'h '+r+'m' : h+'h'; }

async function loadState(){
  try{
    const raw = localStorage.getItem('dispatch-state-v2');
    if(raw){ STATE = JSON.parse(raw); }
  }catch(e){ console.error('load failed', e); }
  if(!STATE.tasks) STATE.tasks=[];
  if(!STATE.days) STATE.days={};
  const dk = todayKey();
  if(!STATE.days[dk]){
    STATE.days[dk] = { availableMinutes:null, breaks:[], activeBreak:null, completed:[], decisions:{} };
  }
}
async function saveState(){
  try{ localStorage.setItem('dispatch-state-v2', JSON.stringify(STATE)); }catch(e){ console.error('save failed', e); }
}

function addTask(title, priority, minutes, recurring, category){
  const id = 't_' + Date.now() + '_' + Math.floor(Math.random()*1000);
  STATE.tasks.push({ id, title, priority, minutes, recurring, category, addedDate: todayKey() });
  saveState(); render();
}
function markDone(taskId){
  const dk = todayKey();
  const day = STATE.days[dk];
  const idx = day.completed.indexOf(taskId);
  if(idx>=0) day.completed.splice(idx,1);
  else day.completed.push(taskId);
  saveState(); render();
  const btn = document.getElementById('btn_'+taskId);
  if(btn){ btn.classList.add('bump'); setTimeout(()=>btn.classList.remove('bump'),300); }
}
function decideTask(taskId, choice){
  STATE.days[todayKey()].decisions[taskId] = choice;
  saveState(); render();
}
function unparkTask(taskId){
  delete STATE.days[todayKey()].decisions[taskId];
  saveState(); render();
}
function removeTask(taskId){
  if(!confirm('Delete this task for good?')) return;
  STATE.tasks = STATE.tasks.filter(t=>t.id!==taskId);
  saveState(); render();
}
function startEdit(taskId){ editingId = taskId; render(); }
function cancelEdit(){ editingId = null; render(); }
function saveEdit(taskId){
  const t = STATE.tasks.find(t=>t.id===taskId);
  if(!t) return;
  t.title = document.getElementById('edit_title').value.trim() || t.title;
  t.priority = document.getElementById('edit_priority').value;
  t.minutes = parseInt(document.getElementById('edit_minutes').value) || t.minutes;
  t.category = document.getElementById('edit_category').value;
  t.recurring = document.getElementById('edit_recurring').checked;
  editingId = null;
  saveState(); render();
}
function setHours(val){
  STATE.days[todayKey()].availableMinutes = Math.round(parseFloat(val)*60);
  saveState(); render();
}
function toggleBreak(){
  const day = STATE.days[todayKey()];
  if(day.activeBreak){
    day.breaks.push({ start: day.activeBreak.start, end: new Date().toISOString(), reason: day.activeBreak.reason });
    day.activeBreak = null;
  } else {
    const reason = prompt("What's the break for?", "");
    if(reason===null) return;
    day.activeBreak = { start: new Date().toISOString(), reason: reason || 'break' };
  }
  saveState(); render();
}
function dismissCheckin(){ STATE.lastCheckin = new Date().toISOString(); saveState(); render(); }
function setFilter(cat){ activeFilter = cat; render(); }

function taskStreak(taskId){
  let streak = 0;
  for(let i=0;i<365;i++){
    const key = dateKey(i);
    const day = STATE.days[key];
    if(day && day.completed && day.completed.includes(taskId)) streak++;
    else { if(i===0) continue; break; }
  }
  return streak;
}
function streakBadge(streak){
  if(streak>=14) return '🔥🔥🔥';
  if(streak>=7) return '🔥🔥';
  if(streak>=3) return '🔥';
  return '';
}

function buildSchedule(){
  const dk = todayKey();
  const day = STATE.days[dk];
  const budget = day.availableMinutes;
  let active = STATE.tasks.filter(t => !day.completed.includes(t.id) && day.decisions[t.id] !== 'pool' && day.decisions[t.id] !== 'tomorrow');
  if(activeFilter !== 'all') active = active.filter(t => t.category === activeFilter);
  active.sort((a,b)=> PRIO_WEIGHT[b.priority]-PRIO_WEIGHT[a.priority] || a.minutes-b.minutes);

  let cursor = new Date();
  let remaining = budget==null ? Infinity : budget;
  const schedule = [];
  const needsDecision = [];

  for(const t of active){
    if(t.minutes <= remaining){
      schedule.push({ task:t, start:new Date(cursor), end:new Date(cursor.getTime()+t.minutes*60000) });
      cursor = new Date(cursor.getTime()+t.minutes*60000);
      remaining -= t.minutes;
    } else if(day.decisions[t.id]===undefined){
      needsDecision.push(t);
    }
  }
  return { schedule, needsDecision };
}

function minutesForDay(key){
  const day = STATE.days[key];
  if(!day || !day.completed) return 0;
  let mins=0;
  day.completed.forEach(id=>{ const t=STATE.tasks.find(t=>t.id===id); if(t) mins+=t.minutes; });
  return mins;
}

function logSleep(bedtime, wake){
  if(!bedtime || !wake) return;
  const [bh,bm] = bedtime.split(':').map(Number);
  const [wh,wm] = wake.split(':').map(Number);
  let bedMins = bh*60+bm, wakeMins = wh*60+wm;
  let diff = wakeMins - bedMins;
  if(diff <= 0) diff += 24*60; // crossed midnight
  const v = getVitals(todayKey());
  v.sleep = { bedtime, wake, hours: Math.round((diff/60)*10)/10 };
  saveState(); render();
}

function logRun(km, minutes, from, to){

function weekVsLastWeek(){
  const thisWeek=[], lastWeek=[], labels=[];
  for(let i=6;i>=0;i--){
    thisWeek.push(minutesForDay(dateKey(i)));
    labels.push(new Date(dateKey(i)).toLocaleDateString('en-US',{weekday:'narrow'}));
  }
  for(let i=13;i>=7;i--){ lastWeek.push(minutesForDay(dateKey(i))); }
  return { thisWeek, lastWeek, labels };
}
function heatmap90(){
  const cells = [];
  for(let i=89;i>=0;i--){
    const key = dateKey(i);
    const mins = minutesForDay(key);
    let level = 0;
    if(mins>0) level=1;
    if(mins>=30) level=2;
    if(mins>=75) level=3;
    if(mins>=150) level=4;
    cells.push({ key, mins, level, isToday: key===todayKey() });
  }
  return cells;
}
function categoryBreakdown30(){
  const totals = {};
  CATEGORIES.forEach(c=>totals[c]=0);
  for(let i=0;i<30;i++){
    const key = dateKey(i);
    const day = STATE.days[key];
    if(day && day.completed){
      day.completed.forEach(id=>{
        const t = STATE.tasks.find(t=>t.id===id);
        if(t){ const cat = t.category||'Other'; totals[cat] = (totals[cat]||0) + t.minutes; }
      });
    }
  }
  return totals;
}

function weeklyStats(){
  let totalCompleted=0, totalScheduledSlots=0, totalMinutes=0;
  const dailyMinutes = [];
  for(let i=6;i>=0;i--){
    const key = dateKey(i);
    const day = STATE.days[key];
    let mins = 0;
    if(day && day.completed){
      day.completed.forEach(id=>{
        const t = STATE.tasks.find(t=>t.id===id);
        if(t) mins += t.minutes;
      });
      totalCompleted += day.completed.length;
    }
    dailyMinutes.push({ key, mins, isToday: key===todayKey() });
    totalMinutes += mins;
  }
  let bestStreak = 0;
  STATE.tasks.forEach(t=>{ bestStreak = Math.max(bestStreak, taskStreak(t.id)); });
  const dk = todayKey();
  const todayDay = STATE.days[dk];
  const { schedule } = buildSchedule();
  const scheduledToday = schedule.length;
  const doneToday = schedule.filter(s=>todayDay.completed.includes(s.task.id)).length;
  const pct = scheduledToday>0 ? Math.round((doneToday/scheduledToday)*100) : 0;
  return { dailyMinutes, totalMinutes, bestStreak, pct, doneToday, scheduledToday };
}

function ringSVG(pct){
  const r=30, c=2*Math.PI*r;
  const offset = c - (pct/100)*c;
  return `<svg width="74" height="74" viewBox="0 0 74 74">
    <circle cx="37" cy="37" r="${r}" fill="none" stroke="#2C4C7C" stroke-width="7"/>
    <circle cx="37" cy="37" r="${r}" fill="none" stroke="#FFB627" stroke-width="7" stroke-dasharray="${c}" stroke-dashoffset="${offset}" stroke-linecap="round"/>
  </svg>`;
}

    } else {
      schedule.forEach(s=>{
        const done = day.completed.includes(s.task.id);
        const streak = taskStreak(s.task.id);
        if(editingId === s.task.id){
          html += `<div class="edit-row">
            <div class="erow">
              <input type="text" id="edit_title" value="${s.task.title}">
              <select id="edit_category">${CATEGORIES.map(c=>`<option value="${c}" ${c===s.task.category?'selected':''}>${c}</option>`).join('')}</select>
            </div>
            <div class="erow">
              <select id="edit_priority"><option value="high" ${s.task.priority==='high'?'selected':''}>High</option><option value="medium" ${s.task.priority==='medium'?'selected':''}>Medium</option><option value="low" ${s.task.priority==='low'?'selected':''}>Low</option></select>
              <input type="number" id="edit_minutes" value="${s.task.minutes}">
              <label class="chk"><input type="checkbox" id="edit_recurring" ${s.task.recurring?'checked':''}> daily</label>
            </div>
            <div class="ebtns"><button class="save" onclick="saveEdit('${s.task.id}')">Save</button><button onclick="cancelEdit()">Cancel</button></div>
          </div>`;
        } else {
          html += `<div class="task-row ${done?'done':''}">
            <div class="prio-tag ${s.task.priority}"></div>
            <div class="task-main">
              <div class="task-name-row">
                <span class="task-name">${s.task.title}</span>
                <span class="cat-tag" style="background:${CAT_COLOR[s.task.category]||CAT_COLOR.Other}">${s.task.category||'Other'}</span>
                ${streak>=3?`<span class="streak-badge">${streakBadge(streak)} ${streak}d</span>`:''}
              </div>
              <div class="task-meta">${PRIO_LABEL[s.task.priority]} · ${minsToLabel(s.task.minutes)} ${s.task.recurring?'· daily':''}</div>
            </div>
            <div class="task-time">${fmtTime(s.start)}–${fmtTime(s.end)}</div>
            <div class="task-actions">
              <button class="icon-btn" onclick="startEdit('${s.task.id}')" title="Edit">✎</button>
              <button class="icon-btn" onclick="removeTask('${s.task.id}')" title="Delete">🗑</button>
            </div>
            <button class="donebtn ${done?'checked':''}" id="btn_${s.task.id}" onclick="markDone('${s.task.id}')">${done?'✓':''}</button>
          </div>`;
        }
      });
    }

    if(needsDecision.length){
      html += `<div class="section-title">Doesn't Fit Today — Your Call</div>`;
      needsDecision.forEach(t=>{
        html += `<div class="decision-card">
          <div class="dtitle">${t.title}</div>
          <div class="dtext">${PRIO_LABEL[t.priority]} priority, ${minsToLabel(t.minutes)} — not enough time left in today's budget.</div>
          <div class="dbtns">
            <button onclick="decideTask('${t.id}','tomorrow')">Push to Tomorrow</button>
            <button onclick="decideTask('${t.id}','pool')">Leave Unscheduled</button>
          </div>
        </div>`;
      });
    }

    const parked = STATE.tasks.filter(t => day.decisions[t.id]==='pool' && !day.completed.includes(t.id));
    if(parked.length){
      html += `<div class="section-title">Parked</div>`;
      parked.forEach(t=>{
        html += `<div class="pool-row"><span>${t.title} (${minsToLabel(t.minutes)})</span><button onclick="unparkTask('${t.id}')">Schedule Now</button></div>`;
      });
    }
  }

  html += `<div class="footer-note"><b>How it works:</b> tasks are placed high → medium → low priority into today's available hours, shortest-first within each tier. Filter by category to focus on one track. Anything that won't fit asks you directly. Streaks track consecutive days a task gets stamped ✓. Ending a break recalculates from the current time — nothing is lost.</div>`;

  document.getElementById('board').innerHTML = html;
}

function submitAdd(){
  const title = document.getElementById('newTitle').value.trim();
  const priority = document.getElementById('newPriority').value;
  const minutes = parseInt(document.getElementById('newMinutes').value) || 30;
  const recurring = document.getElementById('newRecurring').checked;
  const category = document.getElementById('newCategory').value;
  if(!title) return;
  addTask(title, priority, minutes, recurring, category);
}

initTheme();
loadState().then(render);
setInterval(render, 60000);

if('serviceWorker' in navigator){
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(e => console.error('SW registration failed', e));
  });
}
</script>
</body>
</html>
